      <rect x="0" y="0" width="96" height="14" rx="7" fill="#38BDF8"/>
      <rect x="0" y="32" width="208" height="1" fill="#334155"/>

      <g transform="translate(0 56)">
        <circle cx="12" cy="12" r="12" fill="#22C55E" fill-opacity="0.18"/>
        <path d="M6 12L10 16L18 8" stroke="#4ADE80" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="38" y="5" width="136" height="8" rx="4" fill="#CBD5E1"/>
        <rect x="38" y="21" width="90" height="7" rx="3.5" fill="#64748B"/>
