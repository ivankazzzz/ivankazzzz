<svg width="920" height="300" viewBox="0 0 920 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Absensi Digital Universitas Ekasakti</title>
  <desc id="desc">Impact project card for a digital attendance system at Universitas Ekasakti.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.56" stop-color="#10243A"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="42" x2="870" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F81F7"/>
      <stop offset="0.5" stop-color="#3FB950"/>
      <stop offset="1" stop-color="#A371F7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#010409" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="920" height="300" rx="28" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="917" height="297" rx="26.5" stroke="#30363D" stroke-width="3"/>
  <path d="M40 244 C170 188 240 258 370 202 C510 142 600 224 748 154 C820 120 866 118 900 124" stroke="url(#accent)" stroke-width="3" opacity="0.55"/>
  <path d="M40 262 C180 214 286 278 430 222 C584 162 650 220 790 184 C842 170 880 170 904 174" stroke="#58A6FF" stroke-width="1.6" opacity="0.25"/>

  <g filter="url(#shadow)">
    <rect x="42" y="40" width="836" height="220" rx="22" fill="#161B22" fill-opacity="0.92"/>
    <rect x="43" y="41" width="834" height="218" rx="21" stroke="#30363D" stroke-width="2"/>
  </g>

  <g transform="translate(72 70)">
    <rect x="0" y="0" width="132" height="32" rx="16" fill="#0D419D"/>
    <text x="66" y="21" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">IMPACT PROJECT</text>

    <text x="0" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#F0F6FC">Absensi Digital</text>
    <text x="0" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#C9D1D9">Universitas Ekasakti</text>

    <text x="0" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#8B949E">
      Digital attendance system for structured campus workflows, cleaner records, and easier monitoring.
    </text>

    <g transform="translate(0 176)">
      <rect x="0" y="0" width="154" height="30" rx="15" fill="#1F6FEB" fill-opacity="0.16" stroke="#1F6FEB" stroke-opacity="0.55"/>
      <text x="77" y="20" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#79C0FF">Higher Education</text>

      <rect x="166" y="0" width="158" height="30" rx="15" fill="#238636" fill-opacity="0.16" stroke="#238636" stroke-opacity="0.55"/>
      <text x="245" y="20" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7EE787">Digital Attendance</text>

      <rect x="336" y="0" width="158" height="30" rx="15" fill="#8957E5" fill-opacity="0.16" stroke="#8957E5" stroke-opacity="0.55"/>
      <text x="415" y="20" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#D2A8FF">Campus Workflow</text>
    </g>
  </g>

  <g transform="translate(690 76)">
    <rect x="0" y="0" width="126" height="126" rx="28" fill="#0D1117" stroke="#30363D" stroke-width="2"/>
    <rect x="31" y="28" width="64" height="76" rx="12" fill="#21262D" stroke="#58A6FF" stroke-width="3"/>
    <path d="M49 54H77" stroke="#7EE787" stroke-width="5" stroke-linecap="round"/>
    <path d="M49 73H77" stroke="#7EE787" stroke-width="5" stroke-linecap="round"/>
    <path d="M49 92H66" stroke="#7EE787" stroke-width="5" stroke-linecap="round"/>
    <circle cx="95" cy="95" r="22" fill="#238636"/>
    <path d="M84 95L91 102L107 84" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
