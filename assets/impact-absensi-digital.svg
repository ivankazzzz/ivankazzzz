        <path d="M12 6V12L17 15" stroke="#7DD3FC" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="38" y="5" width="116" height="8" rx="4" fill="#CBD5E1"/>
        <rect x="38" y="21" width="126" height="7" rx="3.5" fill="#64748B"/>
      </g>

      <g transform="translate(0 148)">
        <rect x="0" y="0" width="208" height="10" rx="5" fill="#1E293B"/>
        <rect x="0" y="0" width="146" height="10" rx="5" fill="#22C55E"/>
      </g>
