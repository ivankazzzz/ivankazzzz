<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Absensi Digital Universitas Ekasakti</title>
  <desc id="desc">Featured impact project card for a digital attendance system at Universitas Ekasakti.</desc>

  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1000" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="line" x1="60" y1="40" x2="940" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="screen" x1="666" y1="80" x2="900" y2="281" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="360" rx="26" fill="url(#panel)"/>
  <rect x="1" y="1" width="998" height="358" rx="25" stroke="#243044" stroke-width="2"/>
  <rect x="60" y="38" width="880" height="4" rx="2" fill="url(#line)"/>

  <g transform="translate(60 74)">
    <rect x="0" y="0" width="158" height="34" rx="17" fill="#E0F2FE" fill-opacity="0.08" stroke="#38BDF8" stroke-opacity="0.45"/>
    <text x="79" y="22" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2" fill="#7DD3FC">IMPACT PROJECT</text>

    <text x="0" y="82" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="43" font-weight="800" fill="#F8FAFC">Absensi Digital</text>
    <text x="0" y="126" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#CBD5E1">Universitas Ekasakti</text>

    <text x="0" y="171" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#94A3B8">
      Sistem absensi digital untuk membantu alur kehadiran kampus menjadi
    </text>
    <text x="0" y="198" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#94A3B8">
