    </text>

    <g transform="translate(0 230)">
      <rect x="0" y="0" width="154" height="44" rx="12" fill="#020617" fill-opacity="0.55" stroke="#1E293B"/>
      <text x="18" y="19" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#38BDF8">DOMAIN</text>
      <text x="18" y="33" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#E2E8F0">Higher Education</text>

      <rect x="170" y="0" width="154" height="44" rx="12" fill="#020617" fill-opacity="0.55" stroke="#1E293B"/>
      <text x="188" y="19" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#22C55E">FOCUS</text>
      <text x="188" y="33" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#E2E8F0">Digital Attendance</text>

      <rect x="340" y="0" width="154" height="44" rx="12" fill="#020617" fill-opacity="0.55" stroke="#1E293B"/>
      <text x="358" y="19" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#A78BFA">IMPACT</text>
      <text x="358" y="33" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#E2E8F0">Campus Workflow</text>
    </g>
  </g>

